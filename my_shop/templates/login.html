<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure Login Gate for Aroma Home Ireland">
    
    <title>Customer Login | Aroma Home Ireland</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>

        :root {
            --brand-primary: #4e342e;
            --brand-accent: #8d6e63;
            --bg-gradient-1: #fcf9f7;
            --bg-gradient-2: #efe5e2;
            --white-glass: rgba(255, 255, 255, 0.92);
            --transition-smooth: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }


        body { 
            background: linear-gradient(-45deg, var(--bg-gradient-1), var(--bg-gradient-2), #e0d4d0, var(--bg-gradient-1));
            background-size: 400% 400%;
            animation: moveGradient 12s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: var(--brand-primary);
            margin: 0;
            padding: 20px;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }


        .auth-animate-in {
            animation: slideUpFade 0.9s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }


        .login-card-premium { 
            background: var(--white-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.6); 
            box-shadow: 0 30px 70px rgba(78, 52, 46, 0.12); 
            padding: 60px;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }


        .login-header h2 { 
            font-weight: 800; 
            font-size: 2rem;
            letter-spacing: -1.5px;
            color: var(--brand-primary);
            margin-bottom: 8px;
        }

        .login-header p {
            color: #7a7a7a;
            font-size: 0.95rem;
            margin-bottom: 35px;
        }


        .form-group-custom {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-label-custom {
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brand-accent);
            margin-left: 4px;
            margin-bottom: 8px;
            display: block;
        }

        .form-input-field {
            border-radius: 18px;
            padding: 15px 22px;
            border: 2px solid rgba(0,0,0,0.03);
            background: #ffffff;
            width: 100%;
            transition: var(--transition-smooth);
            font-size: 1rem;
        }

        .form-input-field:focus {
            border-color: var(--brand-accent);
            box-shadow: 0 10px 25px rgba(141, 110, 99, 0.08);
            outline: none;
            transform: scale(1.01);
        }


        .btn-sign-in { 
            background: var(--brand-primary); 
            color: white;
            border: none; 
            border-radius: 18px;
            padding: 16px;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 15px;
            transition: var(--transition-smooth);
            cursor: pointer;
        }

        .btn-sign-in:hover { 
            background-color: var(--brand-accent); 
            box-shadow: 0 12px 30px rgba(78, 52, 46, 0.25);
            transform: translateY(-2px);
        }


        .brand-emblem {
            font-size: 3.5rem;
            margin-bottom: 10px;
            display: inline-block;
        }

        .helper-links {
            margin-top: 30px;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 25px;
            font-size: 0.9rem;
        }

        .helper-links a {
            color: var(--brand-primary);
            text-decoration: none;
            font-weight: 700;
            transition: 0.2s;
        }

        .helper-links a:hover {
            color: var(--brand-accent);
            text-decoration: underline;
        }


        .security-badge {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #b0b0b0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="login-card-premium auth-animate-in">
            
            <div class="login-header">
                <span class="brand-emblem">☘️</span>
                <h2>Welcome Back</h2>
                <p>Sign in to manage your orders and scents.</p>
            </div>

            <form method="POST">
                <div class="form-group-custom">
                    <label class="form-label-custom" for="username">Username</label>
                    <input type="text" 
                           id="username" 
                           name="username" 
                           class="form-input-field" 
                           placeholder="Enter your username"
                           required>
                </div>

                <div class="form-group-custom">
                    <label class="form-label-custom" for="password">Password</label>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           class="form-input-field" 
                           placeholder="••••••••••••"
                           required>
                </div>

                <button type="submit" class="btn-sign-in">
                    Sign In to Aroma Home
                </button>
            </form>

            <div class="helper-links">
                <p class="mb-2">Forgot password? <a href="#">Reset it here</a></p>
                <p class="mb-0">Need an account? <a href="/register">Join the community</a></p>
            </div>

            <div class="security-badge">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="bi bi-shield-lock" viewBox="0 0 16 16">
                  <path d="M5.338 1.59a61.44 61.44 0 0 0-2.837.856.481.481 0 0 0-.328.39c-.554 4.157.726 7.19 2.253 9.188a10.725 10.725 0 0 0 2.287 2.233c.346.244.652.42.893.533.12.057.218.095.293.118a.55.55 0 0 0 .101.025.615.615 0 0 0 .1-.025c.076-.023.174-.061.294-.118.24-.113.547-.29.893-.533a10.726 10.726 0 0 0 2.287-2.233c1.527-1.997 2.807-5.031 2.253-9.188a.48.48 0 0 0-.328-.39c-.651-.213-1.75-.56-2.837-.855C9.552 1.29 8.531 1.067 8 1.067c-.53 0-1.552.223-2.662.524zM8.5 6a.5.5 0 0 0-1 0v1.5H6a.5.5 0 0 0 0 1h1.5V10a.5.5 0 0 0 1 0V8.5H10a.5.5 0 0 0 0-1H8.5V6z"/>
                </svg>
                <span>End-to-End Encrypted Login</span>
            </div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
