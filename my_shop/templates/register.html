<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your Aroma Home Ireland account">
    
    <title>Create Account | Aroma Home Ireland</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --brand-primary: #4e342e;
            --brand-accent: #8d6e63;
            --bg-gradient-1: #fcf9f7;
            --bg-gradient-2: #efe5e2;
            --white-glass: rgba(255, 255, 255, 0.92);
            --transition-smooth: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body { 
            background: linear-gradient(-45deg, var(--bg-gradient-1), var(--bg-gradient-2), #e0d4d0, var(--bg-gradient-1));
            background-size: 400% 400%;
            animation: moveGradient 12s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: var(--brand-primary);
            margin: 0;
            padding: 20px;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-animate-in {
            animation: slideUpFade 0.9s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .reg-card-premium { 
            background: var(--white-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.6); 
            box-shadow: 0 30px 70px rgba(78, 52, 46, 0.12); 
            padding: 60px;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .reg-header h2 { 
            font-weight: 800; 
            font-size: 2rem;
            letter-spacing: -1.5px;
            color: var(--brand-primary);
            margin-bottom: 8px;
        }

        .reg-header p {
            color: #7a7a7a;
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        .form-group-custom {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-label-custom {
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brand-accent);
            margin-left: 4px;
            margin-bottom: 8px;
            display: block;
        }

        .form-input-field {
            border-radius: 18px;
            padding: 15px 22px;
            border: 2px solid rgba(0,0,0,0.03);
            background: #ffffff;
            width: 100%;
            transition: var(--transition-smooth);
            font-size: 1rem;
        }

        .form-input-field:focus {
            border-color: var(--brand-accent);
            box-shadow: 0 10px 25px rgba(141, 110, 99, 0.08);
            outline: none;
            transform: scale(1.01);
        }

        .btn-register { 
            background: var(--brand-primary); 
            color: white;
            border: none; 
            border-radius: 18px;
            padding: 16px;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 15px;
            transition: var(--transition-smooth);
            cursor: pointer;
        }

        .btn-register:hover { 
            background-color: var(--brand-accent); 
            box-shadow: 0 12px 30px rgba(78, 52, 46, 0.25);
            transform: translateY(-2px);
        }

        .brand-emblem {
            font-size: 3.5rem;
            margin-bottom: 10px;
            display: inline-block;
        }

        .helper-links {
            margin-top: 30px;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 25px;
            font-size: 0.9rem;
        }

        .helper-links a {
            color: var(--brand-primary);
            text-decoration: none;
            font-weight: 700;
            transition: 0.2s;
        }

        .helper-links a:hover {
            color: var(--brand-accent);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="reg-card-premium auth-animate-in">
            
            <div class="reg-header">
                <span class="brand-emblem">☘️</span>
                <h2>Join Aroma Home</h2>
                <p>Create an account to start your scent journey.</p>
            </div>

            <form method="POST">
                <div class="form-group-custom">
                    <label class="form-label-custom" for="username">Username</label>
                    <input type="text" 
                           id="username" 
                           name="username" 
                           class="form-input-field" 
                           placeholder="Choose a unique username"
                           required>
                </div>

                <div class="form-group-custom">
                    <label class="form-label-custom" for="password">Password</label>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           class="form-input-field" 
                           placeholder="••••••••••••"
                           required>
                </div>

                <button type="submit" class="btn-register">
                    Create My Account
                </button>
            </form>

            <div class="helper-links">
                <p class="mb-0">Already a member? <a href="/login">Sign In here</a></p>
            </div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
