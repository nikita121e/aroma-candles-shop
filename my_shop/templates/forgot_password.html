<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Aroma Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --brand-primary: #4e342e; --brand-accent: #8d6e63; }
        body { 
            background: linear-gradient(-45deg, #fcf9f7, #efe5e2, #e0d4d0, #fcf9f7);
            background-size: 400% 400%;
            animation: moveGradient 15s ease infinite;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        @keyframes moveGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .reset-card { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 35px; padding: 50px;
            box-shadow: 0 25px 50px rgba(78, 52, 46, 0.1);
            width: 100%; max-width: 450px; text-align: center;
        }
        .btn-reset { 
            background: var(--brand-primary); color: white; border-radius: 15px;
            padding: 14px; width: 100%; border: none; font-weight: 700; transition: 0.3s;
        }
        .btn-reset:hover { background: var(--brand-accent); transform: translateY(-2px); }
        .input-custom { border-radius: 15px; padding: 12px 20px; border: 2px solid rgba(0,0,0,0.05); margin-bottom: 20px; width: 100%; }
    </style>
</head>
<body>
    <div class="reset-card">
        <h2 class="fw-bold mb-3">Forgot Password?</h2>
        <p class="text-muted mb-4">Enter your email and we'll send you a secure link to reset your password.</p>
        
        <form method="POST" action="/forgot-password">
            <div class="text-start">
                <label class="small fw-bold text-uppercase ms-2 mb-2" style="color: var(--brand-accent);">Email Address</label>
                <input type="email" name="email" class="input-custom" placeholder="e.g. name@example.ie" required>
            </div>
            <button type="submit" class="btn-reset shadow-sm">Send Reset Link</button>
        </form>
        
        <div class="mt-4">
            <a href="/login" class="text-decoration-none small fw-bold" style="color: var(--brand-primary);">← Back to Login</a>
        </div>
    </div>
</body>
</html>
