<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmed — Aroma Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: #fcf9f7;">
    <div class="container text-center" style="margin-top: 100px;">
        <div class="display-1">🌿</div>
        <h1 class="fw-bold mt-4">Thank you for your order!</h1>
        <p class="lead">Your payment was successful and your scents are being prepared.</p>
        <div class="card mx-auto mt-4 p-4 shadow-sm" style="max-width: 500px; border-radius: 20px;">
            <p>Order Number: <strong>{{ order.order_number }}</strong></p>
            <p>Total Paid: <strong>€{{ order.total_paid }}</strong></p>
            <hr>
            <a href="/profile" class="btn btn-dark w-100">View My Orders</a>
        </div>
        <a href="/" class="d-block mt-4 text-muted">Return to Home</a>
    </div>
</body>
</html>
